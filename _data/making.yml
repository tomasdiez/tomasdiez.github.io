  body: " Fab Skate came out of Fab Kids, the programme I ran in the early days of
    Fab Lab Barcelona. The premise was simple, and a little subversive: a kid
    shouldn't just buy a skateboard — they should be able to make one. We cut
    the deck moulds on the CNC, pressed the veneers by hand, and let them shape,
    drill and finish their own boards. A skateboard is a good first object: you
    design it, you make it, then you stand on it. The means of production fit in
    a room, and the person using them can be a kid."
- kind: space
  status: live
  name: Studio P52 Lamp
  meta: StudioP52, Barcelona · design & digital fabrication
  url: https://studiop52.com/
  body: >-
    The StudioP52 Lamp started as a flat sheet and a question: how little can
    you
        ship and still send someone a lamp? The whole shade is cut in one piece and
        scored along its fold lines, so it travels flat — then folds up into a faceted
        shade around a single bulb. We made them at StudioP52, the residency I
        co-founded in a Barcelona workshop, in green and in white, and hung a batch
        from the ceiling on articulated arms. A lamp is mostly air and packaging; this
        one is mostly neither. It arrives as a file and becomes a thing in your hands.
