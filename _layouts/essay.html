---
layout: default
---
<article class="page essay">
  <header class="page-head">
    <p class="kicker">{{ page.kicker | default: "Writing" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.lede %}<p class="lede">{{ page.lede }}</p>{% endif %}
    <p class="essay-meta">
      <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%-d %B %Y" }}</time>
      {% if page.venue %} &middot; {{ page.venue }}{% endif %}
    </p>
  </header>
  {{ content }}
  <p class="section-foot"><a href="{{ '/writing/' | relative_url }}">&larr; All writing</a></p>
</article>
